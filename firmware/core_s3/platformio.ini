[platformio]
src_dir = main
include_dir = include

[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.luma.defaults"
extra_scripts = pre:scripts/generate_embed_sources.py
